<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jarvis Nexus Card</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: transparent;
      color: #a5f3fc;
      padding: 12px;
    }
    .card {
      background: linear-gradient(135deg, #0c1929, #0f2744);
      border: 1px solid rgba(34,211,238,0.25);
      border-radius: 16px;
      padding: 16px;
      max-width: 320px;
    }
    .rank { font-size: 28px; font-weight: 800; color: #22d3ee; }
    .label { font-size: 9px; opacity: 0.5; letter-spacing: 0.15em; text-transform: uppercase; }
    .row { display: flex; justify-content: space-between; margin-top: 12px; }
    .val { font-size: 18px; font-weight: 700; }
    .bar { height: 4px; background: rgba(34,211,238,0.15); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .fill { height: 100%; background: #22d3ee; border-radius: 2px; transition: width 0.5s; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <p class="label">Jarvis Evolution</p>
    <p class="rank" id="rank">—</p>
    <div class="row">
      <div><p class="label">Today</p><p class="val" id="pct">—</p></div>
      <div><p class="label">Streak</p><p class="val" id="streak">—</p></div>
      <div><p class="label">Level</p><p class="val" id="level">—</p></div>
    </div>
    <div class="bar"><div class="fill" id="bar" style="width:0%"></div></div>
  </div>
  <script>
    async function load() {
      try {
        const res = await fetch("/api/nexus/snapshot", { credentials: "include" });
        const d = await res.json();
        document.getElementById("rank").textContent = (d.rank ?? "E") + "-RANK";
        document.getElementById("pct").textContent = (d.todayPercent ?? 0) + "%";
        document.getElementById("streak").textContent = d.streak ?? 0;
        document.getElementById("level").textContent = d.level ?? 1;
        document.getElementById("bar").style.width = (d.todayPercent ?? 0) + "%";
      } catch { document.getElementById("rank").textContent = "Offline"; }
    }
    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
